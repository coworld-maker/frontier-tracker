name: Check Go Wild Flights

on:
  schedule:
    # Every 4 hours — Go Wild seats often drop in the morning
    - cron: "0 */4 * * *"
  workflow_dispatch: # allow manual runs from the Actions tab

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to commit updated state file

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Write config from secret
        run: echo '${{ secrets.CONFIG_JSON }}' > config.json

      - name: Run tracker
        run: python main.py

      - name: Commit updated state
        run: |
          git config user.name "go-wild-bot"
          git config user.email "actions@github.com"
          git add data/seen-flights.json
          git diff --cached --quiet || git commit -m "chore: update seen-flights state [skip ci]"
          git push
