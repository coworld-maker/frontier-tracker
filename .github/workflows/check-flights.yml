name: Check Go Wild Flights

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 2-hour hard cap (well under GitHub's 6h limit)
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Write config from secret
        run: echo '${{ secrets.CONFIG_JSON }}' > config.json

      - name: Run tracker
        env:
          FRONTIER_EMAIL: ${{ secrets.FRONTIER_EMAIL }}
          FRONTIER_PASSWORD: ${{ secrets.FRONTIER_PASSWORD }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python main.py

      - name: Commit updated state
        run: |
          git config user.name "go-wild-bot"
          git config user.email "actions@github.com"
          git add data/seen-flights.json
          git diff --cached --quiet || git commit -m "chore: update seen-flights state [skip ci]"
          git push
